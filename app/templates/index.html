<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MailSilo</title>
<link rel="icon" href="/static/favicon.png" type="image/png">
<link rel="stylesheet" href="/static/mailsilo.css">
</head>
<body>

<div id="authContainer"></div>

<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-content">
      <div class="logo">
        <img src="/static/logo-dark.png" alt="MailSilo">
        <span>MailSilo</span>
      </div>

      <div class="nav-section-label">Navegación</div>
      <nav class="nav">
        <div class="nav-item active" data-view="inbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span>Correos</span>
        </div>
        <div class="nav-item" data-view="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Buscar</span>
        </div>
        <div class="nav-item" data-view="accounts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Cuentas</span>
        </div>
        <div class="nav-item" data-view="import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Importar</span>
        </div>
        <div class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Configuración</span>
        </div>
      </nav>

      <div id="sidebarImportProgress" style="display:none;padding:.5rem .75rem;border-top:1px solid var(--border);margin-top:.5rem">
        <div style="font-size:.75rem;color:var(--accent);margin-bottom:.25rem">📥 Importando...</div>
        <div style="background:var(--surface-2);border-radius:999px;height:4px;overflow:hidden">
          <div id="sidebarImportBar" style="width:0%;height:100%;background:var(--accent);border-radius:999px;transition:width .3s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.2rem">
          <div id="sidebarImportText" style="font-size:.7rem;color:var(--text-tertiary)">Iniciando...</div>
          <button id="sidebarImportCancelBtn" onclick="sidebarCancelImport()" style="font-size:.65rem;padding:2px 6px;background:none;border:1px solid var(--danger);color:var(--danger);border-radius:4px;cursor:pointer">Cancelar</button>
        </div>
      </div>

      <div class="nav-section-label" style="margin-top:.5rem">Cuentas</div>
      <div id="sidebarAccounts"></div>

      <div id="sidebarDeleteProgress" style="display:none;padding:.5rem .75rem;border-top:1px solid var(--border);margin-top:.5rem">
        <div style="font-size:.75rem;color:var(--danger);margin-bottom:.25rem">🗑 Eliminando...</div>
        <div style="background:var(--surface-2);border-radius:999px;height:4px;overflow:hidden">
          <div id="sidebarDeleteBar" style="width:0%;height:100%;background:var(--danger);border-radius:999px;transition:width .3s"></div>
        </div>
        <div id="sidebarDeleteText" style="font-size:.7rem;color:var(--text-tertiary);margin-top:.2rem">Iniciando...</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-footer">
      <span id="stats">0 correos</span>
      <button id="logoutBtn" class="btn-topbar" style="width:100%;justify-content:center" data-action="logout">Cerrar sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <span class="topbar-title" id="topbarTitle">Correos</span>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInputTop" placeholder="Buscar correos...">
      </div>
      <div class="topbar-actions" id="topbarActions">
        <button class="btn-topbar" data-action="fetch-all" title="Sincronizar todas las cuentas">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/></svg>
        </button>
      </div>
    </header>

    <div class="split-view full-width" id="splitView">
      <div class="list-panel" id="listPanel">
        <div class="list-panel-header" id="listPanelHeader">
          <span id="listPanelTitle">Correos</span>
          <span id="listPanelCount"></span>
        </div>
        <div class="list-panel-body" id="listPanelBody">
          <!-- email list rendered here -->
        </div>
      </div>
      <div class="detail-panel" id="detailPanel">
        <div class="detail-empty" id="detailEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span style="font-size:.9rem">Selecciona un correo para leerlo</span>
        </div>
        <div id="detailContent" style="display:none;flex-direction:column;height:100%">
          <div class="detail-header">
            <div class="detail-subject" id="detailSubject"></div>
            <div class="detail-meta" id="detailMeta"></div>
          </div>
          <div class="detail-body" id="detailBody"></div>
          <div class="detail-attachments" id="detailAttachments"></div>
          <div class="detail-actions" id="detailActions"></div>
        </div>
      </div>
    </div>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/modal.js"></script>
<script src="/static/js/inbox.js"></script>
<script src="/static/js/accounts.js"></script>
<script src="/static/js/theme.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/app.js"></script>
<script>initTheme();</script>

</body>
</html>
